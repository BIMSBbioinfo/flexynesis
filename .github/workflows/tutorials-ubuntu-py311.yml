name: Tutorials Ubuntu Py3.11
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'flexynesis/**'
      - '.github/workflows/tutorials-ubuntu-py311.yml'
      - '.github/workflows/tutorials-template.yml'
      - 'pyproject.toml'
  pull_request:
    branches: [main]
    paths:
      - 'flexynesis/**'
      - '.github/workflows/tutorials-ubuntu-py311.yml'
      - '.github/workflows/tutorials-template.yml'
      - 'pyproject.toml'

jobs:
  call-template:
    uses: ./.github/workflows/tutorials-template.yml
    with:
      os: ubuntu-latest
      python-version: "3.11"
